name: QuotaRadar
options:
  bundleIdPrefix: com.ravenlei
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
targets:
  QuotaRadar:
    type: application
    platform: macOS
    sources:
      - path: XcodeTargets/QuotaRadarMacApp
      - path: Sources/QuotaRadarCore
    info:
      path: XcodeTargets/QuotaRadarMacApp/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ravenlei.QuotaRadar
        PRODUCT_MODULE_NAME: QuotaRadar
        PRODUCT_NAME: Usage Radar
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
    dependencies:
      - target: QuotaRadarWidget
        embed: true
  QuotaRadarWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: XcodeTargets/QuotaRadarWidget
      - path: Sources/QuotaRadarCore
    info:
      path: XcodeTargets/QuotaRadarWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ravenlei.QuotaRadar.Widget
        PRODUCT_MODULE_NAME: QuotaRadarWidget
        PRODUCT_NAME: Usage Radar Widget
        APPLICATION_EXTENSION_API_ONLY: YES
